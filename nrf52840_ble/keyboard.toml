[keyboard]
name = "rmk-keyboard"
product_name = "rmk-keyboard"
vendor_id = 0x4743
product_id = 0x5942
manufacturer = "RMK"
chip = "nrf52840"

[matrix]
row_pins = ["P0_06", "P0_08", "P1_01", "P1_02", "P1_07"]
col_pins = ["P0_17", "P0_20", "P0_22", "P0_24", "P1_00", "P0_11", "P1_04","P1_06", "P0_31", "P0_29", "P0_02", "P1_15", "P1_13"]

[rmk]
# Maximum number of morses keyboard can store (max 256)
morse_max_num = 9
# Maximum number of patterns a morse key can handle
max_patterns_per_key = 36

[behavior.morse]
# default profile for morse, tap dance and tap-hold keys:
enable_flow_tap = true
prior_idle_time = "120ms"  # flow_tap needs this
hold_on_other_press = true
hold_timeout = "250ms"
gap_timeout = "250ms"

# list of morse (tap dance) keys:
morses = [
  # td(0): Function key that outputs F1 on tap, F2 on double tap, layer 1 on hold
  { tap = "KpEnter",  hold = "MO(2)" ,hold_after_tap = "CapsLock"},

  # td(1): Modifier key that outputs Shift on hold, Alt on hold after tap,
  { tap = "Enter", hold = "MO(2)",hold_after_tap = "NumLock" },

  # td(2): Navigation key that outputs Tab on tap, Escape on double tap, layer 2 on hold
  { tap = "Delete", hold = "RShift" }

 

# these can be used to override the default morse profile given in [behavior.morse]
[behavior.morse.profiles]
# for home row mod
HRM = { unilateral_tap = true, permissive_hold = true, hold_timeout = "250ms", gap_timeout = "250ms" }
# for "real" morse
MRZ = { normal_mode = true, unilateral_tap = false, hold_timeout = "200ms", gap_timeout = "200ms" }
# for "fast" modifiers (for example on thumb keys)
PN = { hold_on_other_press = true, unilateral_tap = false, hold_timeout = "250ms", gap_timeout = "250ms" }

[layout]
rows = 5
cols = 13
layers = 4  # 改成4层（0,1,2,3）
keymap = [
    # 第0层：基础层
    [
        ["Escape", "Kc1", "Kc2", "Kc3", "Kc4", "Kc5", "Kc6", "Kc7", "Kc8", "Kc9", "Kc0", "Backslash", "Backspace"],
        ["Tab", "Q", "W", "E", "R", "T", "Y", "U", "I", "O", "P", "LeftBracket", "RightBracket"],
        ["TD(0)", "A", "S", "D", "F", "G", "H", "J", "K", "L", "Semicolon", "Quote", "TD(1)"],
        ["LShift", "Z", "X", "C", "V", "B", "N", "M", "Comma", "Dot", "Up", "Slash", "TD(2)"],
        ["LCtrl", "LGui", "LAlt", "Space", "Space", "Mo(1)", "No", "Mo(3)", "Space", "Left", "Down", "Right", "RCtrl"]
    ],
    # 第1层：Fn层
    [
        ["Grave", "F1", "F2", "F3", "F4", "F5", "F6", "F7", "F8", "F9", "F10", "F11", "F12"],
        ["No", "No", "No", "No", "No", "No", "No", "No", "No", "No", "No", "No", "No"],
        ["To(3)", "No", "No", "To(0)", "No", "No", "No", "No", "No", "No", "No", "No", "No"],
        ["No", "No", "No", "No", "No", "No", "No", "No", "No", "No", "No", "No", "No"],
        ["No", "No", "No", "No", "No", "No", "No", "No", "No", "No", "No", "No", "No"]
    ],
    # 第2层：Sleep/PrtSc层
    [
        ["Stop", "No", "No", "No", "No", "No", "No", "No", "No", "No", "No", "No", "PrintScreen"],
        ["No", "No", "No", "No", "No", "No", "No", "No", "No", "No", "No", "No", "No"],
        ["No", "No", "No", "No", "No", "No", "No", "No", "No", "No", "No", "No", "No"],
        ["No", "No", "No", "No", "No", "No", "No", "No", "No", "No", "No", "No", "No"],
        ["Home", "End", "PageUp", "PageDown", "No", "No", "No", "No", "No", "No", "No", "No", "No"]
    ],
    # 第3层：数字小键盘层
    [
        ["Escape", "KpMinus", "KpPlus", "KpSlash", "Kp1", "Kp2", "Kp3", "Kp4", "Kp5", "Kp6", "Kp7", "Kp8", "Backspace"],
        ["Kp7", "Kp8", "Kp9", "Tab", "Q", "W", "E", "R", "T", "Y", "U", "I", "O"],
        ["Kp4", "Kp5", "Kp6", "KpAsterisk", "A", "S", "D", "F", "G", "H", "J", "K", "L"],
        ["Kp1", "Kp2", "Kp3", "LShift", "Z", "X", "C", "V", "B", "N", "M", "P", "Backslash"],
        ["Backspace", "KpDot", "Kp0", "LCtrl", "LGui", "Mo(1)", "No", "LAlt", "Space", "Left", "Down", "Up", "Right"]
    ]
]

[ble]
enabled = true
# vddh has an internal voltage divider
battery_adc_pin = "vddh"
# Or
# battery_adc_pin = "P0_04"
adc_divider_measured = 2000
adc_divider_total = 2806
default_tx_power = 0
# Whether to enable 2M PHY, defaults to true.
use_2m_phy = true
# [Deprecated] Pin that reads battery's charging state, `low-active` means the battery is charging when `charge_state.pin` is low
# charge_state = { pin = "PIN_1", low_active = true }
# [Deprecated] Output LED pin that blinks when the battery is low
# charge_led= { pin = "PIN_2", low_active = true }

