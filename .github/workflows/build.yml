name: CI

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev
        
      - name: Install Rust
        run: |
          rustup update stable
          rustup target add thumbv7em-none-eabihf
          rustup component add rust-src

      - name: Install flip-link
        run: cargo install flip-link
        
      - name: Install elf2uf2-rs
        run: cargo install elf2uf2-rs
        
      - name: Build firmware
        working-directory: nrf52840_ble
        run: cargo build --release
        
      - name: List files
        working-directory: nrf52840_ble
        run: ls -la target/thumbv7em-none-eabihf/release/

      - - name: Convert ELF to UF2
        working-directory: nrf52840_ble
        run: |
          elf2uf2-rs target/thumbv7em-none-eabihf/release/planck59 target/thumbv7em-none-eabihf/release/planck59.uf2
          
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: planck59-firmware
          path: nrf52840_ble/target/thumbv7em-none-eabihf/release/*.uf2
