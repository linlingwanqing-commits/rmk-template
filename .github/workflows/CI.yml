name: Build Firmware

on:
  push:
    branches: [ main, master, s46r ]
  workflow_dispatch:

env:
  RUST_MIN_STACK: 67108864

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Install Rust
        run: |
          rustup update stable
          rustup target add thumbv7em-none-eabihf
          rustup component add rust-src

      - name: Install cargo-make and flip-link
        run: |
          cargo install cargo-make
          cargo install flip-link

      - name: Build firmware
        working-directory: nrf52840_ble
        run: cargo build --release
        env:
          RUST_MIN_STACK: 67108864

      - name: 获取 ELF 文件名
        id: get_name
        working-directory: nrf52840_ble
        run: |
          # 从 Cargo.toml 读取项目名
          PROJECT_NAME=$(grep '^name =' Cargo.toml | head -1 | cut -d '"' -f2)
          echo "project_name=$PROJECT_NAME" >> $GITHUB_OUTPUT
          echo "项目名: $PROJECT_NAME"
          
          # 列出 ELF 文件确认
          echo "ELF 文件列表:"
          ls -la target/thumbv7em-none-eabihf/release/ | grep -v "\.d"

      - name: Generate UF2 (方法1 - 使用 cargo-make)
        working-directory: nrf52840_ble
        continue-on-error: true
        run: cargo make uf2 --release

      - name: Generate UF2 (方法2 - 使用 elf2uf2-rs)
        working-directory: nrf52840_ble
        if: always()
        run: |
          cargo install elf2uf2-rs --force
          PROJECT_NAME="${{ steps.get_name.outputs.project_name }}"
          elf2uf2-rs "target/thumbv7em-none-eabihf/release/$PROJECT_NAME" "${PROJECT_NAME}.uf2" || true

     

      - name: Upload UF2
        uses: actions/upload-artifact@v4
        with:
          name: firmware-uf2
          path: nrf52840_ble/*.uf2