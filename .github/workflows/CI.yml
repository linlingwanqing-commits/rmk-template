name: Build Firmware

on:
  push:
    branches: [ main, master, s46r ]
  workflow_dispatch:

env:
  RUST_MIN_STACK: 67108864

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Install Rust
        run: |
          rustup update stable
          rustup target add thumbv7em-none-eabihf
          rustup component add rust-src

      - name: Install cargo-make and flip-link
        run: |
          cargo install cargo-make
          cargo install flip-link

      - name: Build firmware
        working-directory: nrf52840_ble
        run: cargo build --release
        env:
          RUST_MIN_STACK: 67108864

      - name: Generate UF2 (方法1 - 使用 cargo-make)
        working-directory: nrf52840_ble
        continue-on-error: true
        run: cargo make uf2 --release

      - name: Generate UF2 (方法2 - 使用 elf2uf2-rs)
        working-directory: nrf52840_ble
        if: always()
        run: |
          cargo install elf2uf2-rs --force
          elf2uf2-rs target/thumbv7em-none-eabihf/release/planck59 planck59.uf2 || true

      - name: Generate UF2 (方法3 - 使用 Python)
        working-directory: nrf52840_ble
        if: always()
        run: |
          wget -q https://raw.githubusercontent.com/microsoft/uf2/master/utils/uf2conv.py
          python3 uf2conv.py target/thumbv7em-none-eabihf/release/planck59 -b 0x1000 -c -f 0xADA52840 -o planck59.uf2

      - name: Upload UF2
        uses: actions/upload-artifact@v4
        with:
          name: planck59-uf2
          path: nrf52840_ble/*.uf2